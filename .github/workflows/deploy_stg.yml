name: Deploy → Staging (STG)

on:
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Dry run only (no Snowflake changes)"
        type: boolean
        default: false

env:
  ENV: stg
  PYTHON_VERSION: "3.12"

jobs:
  render-and-deploy:
    name: Render & Deploy to STG
    runs-on: ubuntu-latest
    environment: staging

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Render Jinja templates
        run: python scripts/render.py --env ${{ env.ENV }}

      - name: Upload rendered SQL as artifact
        uses: actions/upload-artifact@v4
        with:
          name: rendered-sql-stg-${{ github.sha }}
          path: rendered/stg/
          retention-days: 30

      - name: Deploy to Snowflake STG
        run: |
          python scripts/deploy.py \
            --env ${{ env.ENV }} \
            ${{ github.event.inputs.dry_run == 'true' && '--dry-run' || '' }}
        env:
          SNOWFLAKE_ACCOUNT:             ${{ secrets.SNOWFLAKE_ACCOUNT }}
          SNOWFLAKE_USER:                ${{ secrets.SNOWFLAKE_USER }}
          SNOWFLAKE_PRIVATE_KEY_PATH:    ${{ secrets.SNOWFLAKE_PRIVATE_KEY_PATH }}
          SNOWFLAKE_PRIVATE_KEY_PASSPHRASE: ${{ secrets.SNOWFLAKE_PRIVATE_KEY_PASSPHRASE }}
          SNOWFLAKE_ROLE:                ${{ secrets.SNOWFLAKE_ROLE_STG }}

      - name: Deployment summary
        if: always()
        run: |
          echo "### Snowflake STG Deployment" >> $GITHUB_STEP_SUMMARY
          echo "- **Environment:** \`${{ env.ENV }}\`" >> $GITHUB_STEP_SUMMARY
          echo "- **Commit:** \`${{ github.sha }}\`" >> $GITHUB_STEP_SUMMARY
          echo "- **Triggered by:** ${{ github.actor }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Dry run:** ${{ github.event.inputs.dry_run || 'false' }}" >> $GITHUB_STEP_SUMMARY
